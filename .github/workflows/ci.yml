name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: py-${{ matrix.python-version }}-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux only (pymomentum-gpu only available on Linux)
          - os: ubuntu-latest
            platform: linux-64
            python-version: py312
          - os: ubuntu-latest
            platform: linux-64
            python-version: py313
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          environments: ${{ matrix.python-version }}
          cache: true

      - name: Run tests
        run: |
          pixi run -e ${{ matrix.python-version }} test

      - name: Download and unzip assets
        run: |
          pixi run -e ${{ matrix.python-version }} download-assets

      - name: Test demo
        run: |
          pixi run -e ${{ matrix.python-version }} demo
